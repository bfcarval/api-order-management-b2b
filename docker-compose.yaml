version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: b2b_postgres
    environment:
      POSTGRES_DB: b2borderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-order-management-b2b:
    build: .
    container_name: api_order_management_b2b
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-db:5432/b2borderdb
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      postgres-db:
        condition: service_healthy
